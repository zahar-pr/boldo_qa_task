[pytest]
minversion = 8.0
asyncio_default_fixture_loop_scope = function
asyncio_mode = strict
testpaths = tests
python_files = test_*.py *_spec.py
python_classes = Test*
python_functions = test_*

addopts =
    --strict-markers
    --tb=short
    -ra
    --alluredir=allure-results
    --clean-alluredir
    -m "not serial"

markers =
    smoke: smoke suite, быстрые критичные тесты
    regression: полный регрессионный набор
    critical: severity critical
    auth: тесты авторизации
    workspace: тесты workspace
    project: тесты проектов
    issues: тесты задач
    views: тесты представлений (kanban/list)
    cycles: тесты циклов
    pages: тесты страниц/документов
    serial: тесты которые меняют глобальное состояние (logout инвалидирует сессию)

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S