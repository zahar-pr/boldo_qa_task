[pytest]
minversion = 8.0
asyncio_default_fixture_loop_scope = function
asyncio_mode = strict
testpaths = tests
python_files = test_*.py *_spec.py
python_classes = Test*
python_functions = test_*

# Allure results
addopts =
    --strict-markers
    --tb=short
    -ra
    --alluredir=allure-results
    --clean-alluredir

# Маркеры — без регистрации pytest ругается при --strict-markers
markers =
    smoke: smoke suite, быстрые критичные тесты (запуск: -m smoke)
    regression: полный регрессионный набор
    critical: severity critical
    auth: тесты авторизации
    workspace: тесты workspace
    project: тесты проектов
    issues: тесты задач
    views: тесты представлений (kanban/list)
    cycles: тесты циклов
    pages: тесты страниц/документов

# Playwright
# Браузер переопределяется через --browser=firefox|webkit
# Headless через env HEADLESS

log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

