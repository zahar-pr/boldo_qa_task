name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Каждый день в 8:00 UTC (11:00 МСК) — поможет обнаружить
    # что сторонний Plane что-то изменил.
    - cron: '0 8 * * *'
  workflow_dispatch:  # ручной запуск из UI

jobs:
  test:
    name: Run E2E suite
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Restore storage_state from secret
        env:
          STORAGE_B64: ${{ secrets.STORAGE_STATE_B64 }}
        run: |
          mkdir -p auth
          echo "$STORAGE_B64" | base64 --decode > auth/storage_state.json
          # Проверка что файл валидный JSON
          python -c "import json; json.load(open('auth/storage_state.json')); print('storage_state.json valid')"

      - name: Create .env from secrets
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          PLANE_EMAIL: ${{ secrets.PLANE_EMAIL }}
          PLANE_WORKSPACE_SLUG: ${{ secrets.PLANE_WORKSPACE_SLUG }}
        run: |
          cat > .env <<EOF
          BASE_URL=${BASE_URL}
          PLANE_EMAIL=${PLANE_EMAIL}
          PLANE_WORKSPACE_SLUG=${PLANE_WORKSPACE_SLUG}
          HEADLESS=true
          DEFAULT_TIMEOUT=15000
          NAVIGATION_TIMEOUT=45000
          STORAGE_STATE_PATH=auth/storage_state.json
          EOF

      - name: Run pytest
        env:
          HEADLESS: true
        run: |
          python -m pytest -v --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 30

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            test-results/
            **/trace.zip
          retention-days: 7
          if-no-files-found: ignore