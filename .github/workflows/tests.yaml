name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  test:
    name: Run E2E suite
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium


      - name: Restore storage_state from secret
        env:
          STORAGE_B64: ${{ secrets.STORAGE_STATE_B64 }}
        run: |
          mkdir -p auth
          echo "Secret length: ${#STORAGE_B64}"
          if [ -z "$STORAGE_B64" ]; then
            echo "::error::STORAGE_STATE_B64 secret is empty or not set"
            exit 1
          fi

          echo "$STORAGE_B64" | base64 -d > auth/storage_state.json
          ls -la auth/storage_state.json

          python -c "
          import json, sys
          try:
              data = json.load(open('auth/storage_state.json'))
              cookies = len(data.get('cookies', []))
              origins = len(data.get('origins', []))
              print(f'✅ Valid JSON. Cookies: {cookies}, Origins: {origins}')
              if cookies == 0:
                  print('::warning::No cookies in storage_state — auth will fail')
          except Exception as e:
              print(f'::error::Invalid JSON: {e}')
              with open('auth/storage_state.json') as f:
                  print(f'First 200 chars: {repr(f.read()[:200])}')
              sys.exit(1)
          "


      - name: Create .env from secrets
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          PLANE_EMAIL: ${{ secrets.PLANE_EMAIL }}
          PLANE_WORKSPACE_SLUG: ${{ secrets.PLANE_WORKSPACE_SLUG }}
        run: |
          # Fail fast if any secret is missing
          if [ -z "$BASE_URL" ]; then
            echo "::error::Secret BASE_URL is empty or not set"
            exit 1
          fi
          if [ -z "$PLANE_EMAIL" ]; then
            echo "::error::Secret PLANE_EMAIL is empty or not set"
            exit 1
          fi
          if [ -z "$PLANE_WORKSPACE_SLUG" ]; then
            echo "::error::Secret PLANE_WORKSPACE_SLUG is empty or not set"
            exit 1
          fi

          # Write .env
          cat > .env <<EOF
          BASE_URL=${BASE_URL}
          PLANE_EMAIL=${PLANE_EMAIL}
          PLANE_WORKSPACE_SLUG=${PLANE_WORKSPACE_SLUG}
          HEADLESS=true
          DEFAULT_TIMEOUT=15000
          NAVIGATION_TIMEOUT=45000
          STORAGE_STATE_PATH=auth/storage_state.json
          EOF

          echo "✅ .env created"
          # Show contents (mask email)
          grep -v "^PLANE_EMAIL" .env
          echo "PLANE_EMAIL=***@$(echo "$PLANE_EMAIL" | cut -d'@' -f2)"

          # Verify pydantic-settings can read it
          python -c "
          import sys
          sys.path.insert(0, '.')
          from src.helpers.config import settings
          print(f'Loaded base_url: {settings.base_url!r}')
          print(f'Loaded workspace_slug: {settings.plane_workspace_slug!r}')
          assert settings.base_url.startswith('http'), f'base_url is invalid: {settings.base_url!r}'
          assert settings.plane_workspace_slug, 'workspace_slug is empty'
          print('✅ Settings load correctly')
          "



      - name: Run pytest
        env:
          HEADLESS: 'true'
          BASE_URL: ${{ secrets.BASE_URL }}
          PLANE_EMAIL: ${{ secrets.PLANE_EMAIL }}
          PLANE_WORKSPACE_SLUG: ${{ secrets.PLANE_WORKSPACE_SLUG }}
          DEFAULT_TIMEOUT: '15000'
          NAVIGATION_TIMEOUT: '45000'
          STORAGE_STATE_PATH: 'auth/storage_state.json'
        run: |
          # Sanity check: env-vars actually present in the process
          python -c "
          import os
          print('BASE_URL =', repr(os.getenv('BASE_URL', '')))
          print('PLANE_WORKSPACE_SLUG =', repr(os.getenv('PLANE_WORKSPACE_SLUG', '')))
          assert os.getenv('BASE_URL', '').startswith('http'), 'BASE_URL is empty in CI'
          "
          python -m pytest -v --alluredir=allure-results



      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 30

      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            test-results/
            **/trace.zip
          retention-days: 7
          if-no-files-found: ignore